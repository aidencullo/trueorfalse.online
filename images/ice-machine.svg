<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0A0A0A"/>
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="50%" stop-color="#6e1b23"/>
      <stop offset="100%" stop-color="#8b2500"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g2)" opacity="0.8"/>
  <!-- Network/surveillance grid -->
  <g stroke="#FF3333" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="0" x2="800" y2="600"/>
    <line x1="200" y1="0" x2="800" y2="400"/>
    <line x1="400" y1="0" x2="800" y2="200"/>
    <line x1="0" y1="200" x2="600" y2="600"/>
    <line x1="0" y1="400" x2="400" y2="600"/>
    <line x1="800" y1="0" x2="0" y2="600"/>
    <line x1="600" y1="0" x2="0" y2="400"/>
  </g>
  <!-- Data nodes -->
  <g fill="#FF3333" opacity="0.3">
    <circle cx="200" cy="150" r="4"/>
    <circle cx="400" cy="200" r="4"/>
    <circle cx="600" cy="100" r="4"/>
    <circle cx="300" cy="400" r="4"/>
    <circle cx="500" cy="350" r="4"/>
    <circle cx="150" cy="500" r="4"/>
    <circle cx="650" cy="450" r="4"/>
  </g>
  <!-- Eye shape -->
  <g fill="none" stroke="#CCFF00" stroke-width="1.5" opacity="0.2">
    <ellipse cx="400" cy="300" rx="120" ry="50"/>
    <circle cx="400" cy="300" r="20"/>
    <circle cx="400" cy="300" r="8" fill="#CCFF00" opacity="0.3"/>
  </g>
</svg>
