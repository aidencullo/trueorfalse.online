<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0A0A0A"/>
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#2e2e6e"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g3)" opacity="0.8"/>
  <!-- Prison bars -->
  <g stroke="#F0F0F0" stroke-width="3" opacity="0.12">
    <line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="250" y1="0" x2="250" y2="600"/>
    <line x1="350" y1="0" x2="350" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/>
    <line x1="550" y1="0" x2="550" y2="600"/>
    <line x1="650" y1="0" x2="650" y2="600"/>
  </g>
  <!-- Newspaper shape behind bars -->
  <g opacity="0.15" fill="#F0F0F0">
    <rect x="250" y="180" width="300" height="240" rx="2"/>
  </g>
  <g opacity="0.1" fill="#0A0A0A">
    <rect x="275" y="200" width="180" height="8"/>
    <rect x="275" y="220" width="250" height="4"/>
    <rect x="275" y="232" width="250" height="4"/>
    <rect x="275" y="244" width="250" height="4"/>
    <rect x="275" y="260" width="120" height="100" rx="1"/>
    <rect x="405" y="260" width="120" height="4"/>
    <rect x="405" y="272" width="120" height="4"/>
    <rect x="405" y="284" width="120" height="4"/>
    <rect x="405" y="296" width="120" height="4"/>
  </g>
  <!-- Accent cross/cancel mark -->
  <g stroke="#CCFF00" stroke-width="2" opacity="0.2">
    <line x1="280" y1="200" x2="520" y2="400"/>
    <line x1="520" y1="200" x2="280" y2="400"/>
  </g>
</svg>
