<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0A0A0A"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g1)" opacity="0.8"/>
  <!-- Scattered document shapes -->
  <g opacity="0.15" fill="#F0F0F0">
    <rect x="100" y="80" width="120" height="160" rx="2" transform="rotate(-8 160 160)"/>
    <rect x="300" y="120" width="120" height="160" rx="2" transform="rotate(5 360 200)"/>
    <rect x="520" y="60" width="120" height="160" rx="2" transform="rotate(-12 580 140)"/>
    <rect x="200" y="300" width="120" height="160" rx="2" transform="rotate(15 260 380)"/>
    <rect x="450" y="320" width="120" height="160" rx="2" transform="rotate(-3 510 400)"/>
    <rect x="620" y="280" width="120" height="160" rx="2" transform="rotate(8 680 360)"/>
  </g>
  <!-- Grid lines suggesting a form -->
  <g stroke="#CCFF00" stroke-width="0.5" opacity="0.2">
    <line x1="80" y1="520" x2="720" y2="520"/>
    <line x1="80" y1="540" x2="720" y2="540"/>
    <line x1="80" y1="560" x2="500" y2="560"/>
  </g>
  <!-- Fingerprint circles -->
  <g fill="none" stroke="#CCFF00" stroke-width="0.8" opacity="0.12">
    <circle cx="650" cy="480" r="20"/>
    <circle cx="650" cy="480" r="28"/>
    <circle cx="650" cy="480" r="36"/>
    <circle cx="650" cy="480" r="44"/>
    <circle cx="650" cy="480" r="52"/>
  </g>
</svg>
